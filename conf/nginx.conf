worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

env ALLOW_NON_CONFIDENTIAL;

events {
    worker_connections 1024;
}

http {
    # DNS resolver - __RESOLVERS__ replaced by entrypoint.sh
    resolver __RESOLVERS__ valid=60s ipv6=off;
    resolver_timeout 5s;

    lua_package_path "/usr/local/openresty/lua/?.lua;;";

    # Trust system CA certs for outbound lua cosocket SSL connections
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 5;

    # Shared dict for caching
    lua_shared_dict e2ee_cache 10m;

    # Initialize the e2ee library at worker startup
    init_worker_by_lua_block {
        local crypto = require("e2ee_crypto")
        local ok, err = crypto.init()
        if not ok then
            ngx.log(ngx.ERR, "FATAL: e2ee_init failed: ", err)
        else
            ngx.log(ngx.INFO, "e2ee proxy library initialized")
        end
    }

    server {
        listen 443 ssl;
        server_name __SERVER_NAME__;

        # Dummy self-signed cert (overridden by ssl_certificate_by_lua_block).
        # OpenResty requires these directives to exist even when using lua.
        # Generated at container startup by entrypoint.sh.
        ssl_certificate /tmp/dummy.crt;
        ssl_certificate_key /tmp/dummy.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Dynamically load certs: file-based (/tmp/ssl.*) or embedded .so
        ssl_certificate_by_lua_block {
            local ssl = require("ngx.ssl")

            local ok, err = ssl.clear_certs()
            if not ok then
                ngx.log(ngx.ERR, "failed to clear certs: ", err)
                return ngx.exit(ngx.ERROR)
            end

            -- Check for file-based certs first (/tmp/ssl.crt written by entrypoint.sh)
            local f = io.open("/tmp/ssl.crt", "r")
            if f then
                local cert_pem = f:read("*a")
                f:close()

                -- Read CA chain if present and append
                local ca = io.open("/tmp/ssl.ca", "r")
                if ca then
                    cert_pem = cert_pem .. "\n" .. ca:read("*a")
                    ca:close()
                end

                local cert_der, cerr = ssl.cert_pem_to_der(cert_pem)
                if not cert_der then
                    ngx.log(ngx.ERR, "failed to convert cert PEM to DER: ", cerr)
                    return ngx.exit(ngx.ERROR)
                end

                ok, err = ssl.set_der_cert(cert_der)
                if not ok then
                    ngx.log(ngx.ERR, "failed to set file-based cert: ", err)
                    return ngx.exit(ngx.ERROR)
                end

                local kf = io.open("/tmp/ssl.key", "r")
                if not kf then
                    ngx.log(ngx.ERR, "failed to open /tmp/ssl.key")
                    return ngx.exit(ngx.ERROR)
                end
                local key_pem = kf:read("*a")
                kf:close()

                local key_der, kerr = ssl.priv_key_pem_to_der(key_pem)
                if not key_der then
                    ngx.log(ngx.ERR, "failed to convert key PEM to DER: ", kerr)
                    return ngx.exit(ngx.ERROR)
                end

                ok, err = ssl.set_der_priv_key(key_der)
                if not ok then
                    ngx.log(ngx.ERR, "failed to set file-based key: ", err)
                    return ngx.exit(ngx.ERROR)
                end
            else
                -- Fall back to embedded certs from protected .so
                local crypto = require("e2ee_crypto")

                local chain_der, cerr = crypto.get_cert_chain_der()
                if not chain_der then
                    ngx.log(ngx.ERR, "failed to get embedded cert chain: ", cerr)
                    return ngx.exit(ngx.ERROR)
                end

                ok, err = ssl.set_der_cert(chain_der)
                if not ok then
                    ngx.log(ngx.ERR, "failed to set embedded cert: ", err)
                    return ngx.exit(ngx.ERROR)
                end

                local key_der, kerr = crypto.get_privkey_der()
                if not key_der then
                    ngx.log(ngx.ERR, "failed to get embedded private key: ", kerr)
                    return ngx.exit(ngx.ERROR)
                end

                ok, err = ssl.set_der_priv_key(key_der)
                if not ok then
                    ngx.log(ngx.ERR, "failed to set embedded private key: ", err)
                    return ngx.exit(ngx.ERROR)
                end
            end
        }

        client_max_body_size 10m;
        client_body_buffer_size 1m;

        # CORS headers on all responses
        more_set_headers 'Access-Control-Allow-Origin: *';
        more_set_headers 'Access-Control-Allow-Methods: GET, POST, PUT, DELETE, PATCH, OPTIONS';
        more_set_headers 'Access-Control-Allow-Headers: *';
        more_set_headers 'Access-Control-Expose-Headers: *';

        # Preflight OPTIONS handler
        location @cors_preflight {
            more_set_headers 'Access-Control-Allow-Origin: *';
            more_set_headers 'Access-Control-Allow-Methods: GET, POST, PUT, DELETE, PATCH, OPTIONS';
            more_set_headers 'Access-Control-Allow-Headers: *';
            more_set_headers 'Access-Control-Max-Age: 86400';
            more_set_headers 'Content-Length: 0';
            return 204;
        }

        location = /health {
            content_by_lua_block {
                ngx.header.content_type = "application/json"
                ngx.say('{"status":"ok"}')
            }
        }

        # /v1/models - plain passthrough to llm.chutes.ai (no e2ee)
        location = /v1/models {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, POST, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            proxy_pass https://llm.chutes.ai/v1/models;
            proxy_ssl_server_name on;
            proxy_set_header Host llm.chutes.ai;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_request_headers on;
        }

        # Claude Messages API handler
        location = /v1/messages {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, POST, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            content_by_lua_block {
                local handler = require("claude_handler")
                handler.handle()
            }
        }

        # OpenAI Responses API handler
        location = /v1/responses {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, POST, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            content_by_lua_block {
                local handler = require("responses_handler")
                handler.handle()
            }
        }

        # E2EE proxy handler for all other /v1/* paths
        location /v1/ {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, POST, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            content_by_lua_block {
                local handler = require("e2ee_handler")
                handler.handle()
            }
        }

        location / {
            default_type application/json;
            return 404 '{"error":"use /v1/ endpoints"}';
        }
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name __SERVER_NAME__;
        return 301 https://$host$request_uri;
    }
}
